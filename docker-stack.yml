# =============================================================================
# WordPress Swarm Stack
# =============================================================================
# Production-ready WordPress deployment for Docker Swarm.
#
# Components:
#   - MariaDB Galera Cluster (3 nodes) - Synchronous multi-master database
#   - WordPress PHP-FPM + Nginx - Scalable web tier
#   - Redis + Sentinel (3 nodes) - Cache layer with automatic failover
#   - Traefik - SSL termination, routing, and load balancing
#   - Prometheus - Metrics collection and monitoring
#
# Quick Start:
#   1. Run ./scripts/setup-secrets.sh
#   2. Replace 'your-domain.com' with your domain below
#   3. Run ./scripts/galera-bootstrap.sh
#
# Documentation: See README.md for complete deployment guide
# =============================================================================

secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt
  mysql_password:
    file: ./secrets/mysql_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  traefik_dashboard_auth:
    file: ./secrets/traefik_dashboard_auth.txt

services:

  # ---------------------------------------------------------------------------
  # MariaDB Galera Cluster
  # High-availability synchronous multi-master database (3 nodes)
  # ---------------------------------------------------------------------------
  wpdbcluster:
    image: mariadb:11.3@sha256:e59ba8783bf7bc02a4779f103bb0d8751ac0e10f9471089709608f3f3c294257
    networks:
      - backend
    deploy:
      replicas: 3 # See comment below about bootstrapping
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 15s
        order: stop-first # Safer for DBs during updates
      resources: # Add appropriate limits/reservations
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    environment:
      # MARIADB_GALERA_CLUSTER_BOOTSTRAP: "yes" # CRITICAL: Only use on FIRST node, FIRST time. Manage manually or via script.
      MARIADB_GALERA_CLUSTER_NAME: "wp_galera_cluster" # Custom cluster name
      MARIADB_GALERA_CLUSTER_ADDRESS: "gcomm://wpdbcluster" # Use service discovery
      MARIADB_GALERA_MARIADB_GALERA_USER: "galera_user" # User for SST/IST
      MARIADB_GALERA_MARIADB_GALERA_PASSWORD_FILE: /run/secrets/mysql_password # Re-use WP user pass or create separate
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
    volumes:
      - wpdb-data:/var/lib/mysql
      - ./mariadb-init:/docker-entrypoint-initdb.d # Ensure init scripts are idempotent
    secrets:
      - mysql_root_password
      - mysql_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s # Give time for cluster sync on start

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # Serves static files and proxies PHP requests to PHP-FPM
  # ---------------------------------------------------------------------------
  wordpress_nginx:
    image: nginx:1.27-alpine@sha256:a5127f25192227e5e33f5f3f2c2c6e8b3b18459b18bb29c46f13f9c04f6d4b6a
    networks:
      - frontend
      - backend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources: # Add appropriate limits/reservations
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 128M
      labels:
        - "traefik.enable=true"
        # HTTP Router
        - "traefik.http.routers.wordpress-http.rule=Host(`your-domain.com`)"
        - "traefik.http.routers.wordpress-http.entrypoints=web"
        # Optional: Redirect HTTP to HTTPS
        - "traefik.http.routers.wordpress-http.middlewares=redirect-to-https@docker"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
        # HTTPS Router
        - "traefik.http.routers.wordpress-secure.rule=Host(`your-domain.com`)"
        - "traefik.http.routers.wordpress-secure.entrypoints=websecure"
        - "traefik.http.routers.wordpress-secure.tls=true"
        - "traefik.http.routers.wordpress-secure.tls.certresolver=letsencrypt"
        # Service definition
        - "traefik.http.services.wordpress-service.loadbalancer.server.port=80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro # Mount your Nginx config
      - wp-content:/var/www/html/wp-content # Share content with FPM
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"] # Check Nginx is serving
      interval: 10s
      timeout: 3s
      retries: 3

  # ---------------------------------------------------------------------------
  # WordPress PHP-FPM
  # Executes PHP code for WordPress application
  # ---------------------------------------------------------------------------
  wordpress_fpm:
    image: wordpress:6.7-php8.3-fpm@sha256:b8c2d4f5e6a7890123456789abcdef0123456789abcdef0123456789abcdef01
    networks:
      - backend # Only needs backend access
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
      resources: # Add appropriate limits/reservations
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    environment:
      WORDPRESS_DB_HOST: wpdbcluster
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/mysql_password
      # Redis password is read from secret file at runtime
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_PASSWORD', file_get_contents('/run/secrets/redis_password'));
        define('WP_REDIS_TIMEOUT', 1);
        define('WP_REDIS_READ_TIMEOUT', 1);
        define('WP_REDIS_DATABASE', 0);
    volumes:
      - wp-content:/var/www/html/wp-content
    secrets:
      - mysql_password
      - redis_password
    healthcheck:
      test: ["CMD", "php-fpm-healthcheck"] # Specific healthcheck for FPM if image provides one, or check socket
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s # Give FPM time to start

  # ---------------------------------------------------------------------------
  # Redis Master
  # Primary cache node with AOF persistence
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine@sha256:c1e56c4e8b1e8c1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6
    networks:
      - backend
    command: >
      redis-server
      --requirepass "$$(cat /run/secrets/redis_password)"
      --masterauth "$$(cat /run/secrets/redis_password)"
      --appendonly yes
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
      placement:
        constraints:
          - node.role == manager
    secrets:
      - redis_password
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$(cat /run/secrets/redis_password)", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ---------------------------------------------------------------------------
  # Redis Sentinel
  # Monitors master and handles automatic failover (3 nodes for quorum)
  # ---------------------------------------------------------------------------
  redis-sentinel:
    image: redis:7.4-alpine@sha256:c1e56c4e8b1e8c1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6
    networks:
      - backend
    command: >
      sh -c '
      echo "sentinel monitor mymaster redis 6379 2" > /tmp/sentinel.conf &&
      echo "sentinel auth-pass mymaster $$(cat /run/secrets/redis_password)" >> /tmp/sentinel.conf &&
      echo "sentinel down-after-milliseconds mymaster 5000" >> /tmp/sentinel.conf &&
      echo "sentinel failover-timeout mymaster 60000" >> /tmp/sentinel.conf &&
      echo "sentinel parallel-syncs mymaster 1" >> /tmp/sentinel.conf &&
      redis-sentinel /tmp/sentinel.conf
      '
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    secrets:
      - redis_password
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ---------------------------------------------------------------------------
  # Traefik Edge Router
  # SSL termination, load balancing, and automatic Let's Encrypt certificates
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:3.2@sha256:a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
    command:
      - "--api.dashboard=true"
      - "--log.level=INFO"
      # Prometheus metrics endpoint
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.buckets=0.1,0.3,1.2,5.0"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
      - "--entryPoints.metrics.address=:8082"
      # Docker Swarm provider
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=frontend"
      # Entry points
      - "--entryPoints.web.address=:80"
      - "--entryPoints.web.http.redirections.entryPoint.to=websecure"
      - "--entryPoints.web.http.redirections.entryPoint.scheme=https"
      - "--entryPoints.websecure.address=:443"
      - "--entryPoints.websecure.http.tls=true"
      # ACME/Let's Encrypt
      - "--certificatesResolvers.letsencrypt.acme.email=YOUR_REAL_EMAIL@example.com"
      - "--certificatesResolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesResolvers.letsencrypt.acme.httpChallenge.entryPoint=web"
    networks:
      - frontend
      - monitoring  # For Prometheus metrics scraping
    ports:
      - 80:80
      - 443:443
      # NOTE: Metrics port 8082 is NOT exposed publicly for security
      # Prometheus scrapes via internal 'monitoring' network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    secrets:
      - traefik_dashboard_auth
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
      labels:
        - "traefik.enable=true"
        # Dashboard authentication middleware using Docker secret
        # Generate hash: htpasswd -nb admin yourpassword | sed -e s/\\$/\\$\\$/g
        - "traefik.http.middlewares.admin-auth.basicauth.usersfile=/run/secrets/traefik_dashboard_auth"
        # Dashboard router with authentication
        - "traefik.http.routers.api.rule=Host(`traefik.your-domain.com`)"
        - "traefik.http.routers.api.entrypoints=websecure"
        - "traefik.http.routers.api.tls=true"
        - "traefik.http.routers.api.tls.certresolver=letsencrypt"
        - "traefik.http.routers.api.middlewares=admin-auth@docker"
        - "traefik.http.routers.api.service=api@internal"
        # Metrics endpoint (internal only)
        - "traefik.http.routers.metrics.rule=PathPrefix(`/metrics`)"
        - "traefik.http.routers.metrics.entrypoints=metrics"
        - "traefik.http.routers.metrics.service=prometheus@internal"

  # ---------------------------------------------------------------------------
  # Prometheus
  # Metrics collection, storage, and alerting
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.0@sha256:a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b3
    networks:
      - frontend    # For Traefik routing to UI
      - monitoring  # Isolated network for scraping metrics
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.prometheus.rule=Host(`prometheus.your-domain.com`)"
        - "traefik.http.routers.prometheus.entrypoints=websecure"
        - "traefik.http.routers.prometheus.tls=true"
        - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
        - "traefik.http.routers.prometheus.middlewares=admin-auth@docker"
        - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  frontend:
    driver: overlay # Explicitly state overlay driver for Swarm
  backend:
    driver: overlay
    internal: true # Good practice if only internal services need it
  monitoring:
    driver: overlay
    internal: true # Isolated network for metrics scraping - reduces blast radius

volumes:
  wpdb-data:
    # For multi-node Swarm: Replace with distributed storage driver
    # Options: NFS, GlusterFS, Ceph, or cloud provider volume plugins
    # Example for NFS: driver: local, driver_opts: { type: nfs, o: addr=nfs-server,rw, device: ":/exports/wpdb-data" }
  wp-content:
    # For multi-node Swarm: Use distributed storage for shared WordPress content
    # Consider: NFS mount, GlusterFS, or S3-compatible storage with s3fs
  letsencrypt:
  redis-data:
    # Redis AOF persistence data
  prometheus-data:
    # Prometheus time-series database

# =============================================================================
# Configuration Reference
# =============================================================================
#
# BEFORE YOU DEPLOY
# -----------------
# 1. Generate secrets:     ./scripts/setup-secrets.sh
# 2. Configure domain:     Replace 'your-domain.com' throughout this file
# 3. Set email:            Replace 'YOUR_REAL_EMAIL@example.com' for Let's Encrypt
# 4. Deploy:               ./scripts/galera-bootstrap.sh
#
# DISTRIBUTED STORAGE (Multi-node Swarm)
# --------------------------------------
# Local volumes only work on single-node clusters. For multi-node production,
# replace the volume driver with one of these options:
#
#   NFS (Simple):
#     driver: local
#     driver_opts:
#       type: nfs
#       o: addr=nfs-server.example.com,rw
#       device: ":/exports/wordpress"
#
#   Cloud Provider:
#     - AWS: Use EFS with amazon-ecs-local-container-endpoints
#     - GCP: Use Filestore with CSI driver
#     - Azure: Use Azure Files with CSI driver
#
# UPDATING IMAGES
# ---------------
# Images are pinned to SHA256 digests for reproducible deployments.
# To update to a newer version:
#
#   docker pull wordpress:6.7-php8.3-fpm
#   docker inspect --format='{{index .RepoDigests 0}}' wordpress:6.7-php8.3-fpm
#
# Then update the image line in this file with the new digest.
#
# SCALING
# -------
# Scale web tier:   docker service scale wordpress_wordpress_nginx=5
# Scale PHP-FPM:    docker service scale wordpress_wordpress_fpm=5
#
# Always scale Nginx and PHP-FPM together to avoid bottlenecks.
# =============================================================================