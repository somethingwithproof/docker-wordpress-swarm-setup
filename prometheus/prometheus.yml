# Prometheus Configuration for WordPress Swarm Stack
# =============================================================================
# This configuration scrapes metrics from:
# - Traefik (reverse proxy metrics)
# - Node exporters (if deployed)
# - Container metrics via cAdvisor (if deployed)
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'wordpress-swarm'
    environment: 'production'

# Alerting configuration (optional - configure Alertmanager if needed)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files for alerting (optional)
# rule_files:
#   - /etc/prometheus/rules/*.yml

scrape_configs:
  # =============================================================================
  # Prometheus self-monitoring
  # =============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # =============================================================================
  # Traefik Metrics
  # =============================================================================
  # Traefik exposes Prometheus metrics on port 8082
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8082']
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'traefik-ingress'

  # =============================================================================
  # Docker Swarm Service Discovery (Optional)
  # =============================================================================
  # Uncomment to enable automatic discovery of services with prometheus labels
  # - job_name: 'docker-swarm-services'
  #   dockerswarm_sd_configs:
  #     - host: unix:///var/run/docker.sock
  #       role: tasks
  #   relabel_configs:
  #     - source_labels: [__meta_dockerswarm_service_label_prometheus_scrape]
  #       regex: 'true'
  #       action: keep
  #     - source_labels: [__meta_dockerswarm_task_address, __meta_dockerswarm_service_label_prometheus_port]
  #       separator: ':'
  #       target_label: __address__
  #     - source_labels: [__meta_dockerswarm_service_name]
  #       target_label: service

  # =============================================================================
  # MariaDB Exporter (Optional - requires mysql_exporter sidecar)
  # =============================================================================
  # Deploy mysql_exporter as a sidecar or separate service to enable these metrics
  # - job_name: 'mariadb'
  #   static_configs:
  #     - targets: ['mysql-exporter:9104']
  #   metrics_path: /metrics
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: instance
  #       replacement: 'galera-cluster'

  # =============================================================================
  # Redis Exporter (Optional - requires redis_exporter sidecar)
  # =============================================================================
  # Deploy redis_exporter to enable Redis metrics
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
  #   metrics_path: /metrics

  # =============================================================================
  # Nginx Exporter (Optional - requires nginx-prometheus-exporter)
  # =============================================================================
  # Requires enabling stub_status in nginx.conf
  # - job_name: 'nginx'
  #   static_configs:
  #     - targets: ['nginx-exporter:9113']
  #   metrics_path: /metrics

  # =============================================================================
  # PHP-FPM Exporter (Optional)
  # =============================================================================
  # Requires PHP-FPM status page enabled and php-fpm_exporter
  # - job_name: 'php-fpm'
  #   static_configs:
  #     - targets: ['php-fpm-exporter:9253']
  #   metrics_path: /metrics

  # =============================================================================
  # Node Exporter (Optional - deploy on each Swarm node)
  # =============================================================================
  # Provides host-level metrics (CPU, memory, disk, network)
  # Deploy node_exporter as a global service on all nodes
  # - job_name: 'node'
  #   dockerswarm_sd_configs:
  #     - host: unix:///var/run/docker.sock
  #       role: nodes
  #   relabel_configs:
  #     - source_labels: [__meta_dockerswarm_node_hostname]
  #       target_label: instance
  #     - source_labels: [__address__]
  #       regex: '(.+):(\d+)'
  #       replacement: '${1}:9100'
  #       target_label: __address__

  # =============================================================================
  # cAdvisor (Optional - container metrics)
  # =============================================================================
  # Deploy cAdvisor as a global service for container resource metrics
  # - job_name: 'cadvisor'
  #   dockerswarm_sd_configs:
  #     - host: unix:///var/run/docker.sock
  #       role: nodes
  #   relabel_configs:
  #     - source_labels: [__meta_dockerswarm_node_hostname]
  #       target_label: instance
  #     - source_labels: [__address__]
  #       regex: '(.+):(\d+)'
  #       replacement: '${1}:8080'
  #       target_label: __address__
